name: Build and push the custom ARC runner image

on:
  push:
    branches: [main]
    paths:
      - "runner-image/**"
      - ".github/workflows/build-runner-image.yml"
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional extra tag, e.g. test1. The image is always tagged with the SHA and latest as well."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fifa-runner

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::12}"
          TAGS="${REGISTRY}/${IMAGE_NAME}:${SHA},${REGISTRY}/${IMAGE_NAME}:latest"
          if [ -n "${{ inputs.tag_suffix }}" ]; then
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${{ inputs.tag_suffix }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runner-image
          file: ./runner-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.tags.outputs.tags }}"
