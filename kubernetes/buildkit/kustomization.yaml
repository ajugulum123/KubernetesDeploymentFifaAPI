apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: buildkit

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  # networkpolicy.yaml is intentionally NOT in the default kustomize bundle.
  # See buildkit/README.md "NetworkPolicy and k3d" for the rationale. Apply it
  # explicitly on a non-k3d cluster:
  #   kubectl apply -f kubernetes/buildkit/networkpolicy.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: fifa-cicd-platform
