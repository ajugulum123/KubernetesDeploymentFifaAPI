# In-cluster BuildKit Deployment.
#
# Security posture:
#
#   - On a cluster whose nodes expose unprivileged user namespaces
#     (most cloud k8s, e.g. EKS / GKE / AKS), this should run rootless:
#     image moby/buildkit:<ver>-rootless, runAsUser: 1000, no privileged,
#     allowPrivilegeEscalation: true (so newuidmap setuid works).
#
#   - On local k3d on Docker Desktop for Mac, the cluster nodes are
#     themselves docker-in-docker containers without unprivileged userns
#     support. RootlessKit fails at startup with
#     'newuidmap operation not permitted'. So for local development we
#     run the non-rootless image with privileged: true. This is OK for
#     a single-user laptop cluster; it is not OK for production.
#
# The comment block above the privileged setting points to the swap.
# Listens on tcp://0.0.0.0:1234. Exposed cluster-internally via the
# buildkitd Service. Locked down to arc-runners ingress only via
# NetworkPolicy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: buildkit
  labels:
    app.kubernetes.io/name: buildkit
    app.kubernetes.io/component: daemon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkit
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkit
        app.kubernetes.io/component: daemon
    spec:
      serviceAccountName: buildkitd
      automountServiceAccountToken: false
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.18.2
          imagePullPolicy: IfNotPresent
          args:
            - --addr
            - tcp://0.0.0.0:1234
          securityContext:
            # privileged: true is required for the OCI worker to set up
            # cgroups, mount overlays and pivot_root for build steps.
            # On a real (non-k3d-on-Mac) cluster, switch back to rootless:
            # image moby/buildkit:<ver>-rootless, runAsUser 1000, no privileged.
            privileged: true
            seccompProfile:
              type: Unconfined
          ports:
            - name: grpc
              containerPort: 1234
              protocol: TCP
          readinessProbe:
            exec:
              command: [buildctl, --addr, tcp://0.0.0.0:1234, debug, workers]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: [buildctl, --addr, tcp://0.0.0.0:1234, debug, workers]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: buildkitd
              mountPath: /var/lib/buildkit
      volumes:
        - name: buildkitd
          emptyDir:
            sizeLimit: 10Gi
