apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - arc-servicemonitor.yaml
  - fifa-api-servicemonitor.yaml
  - prometheus-rules.yaml
  - grafana-dashboard-fifa-cicd.yaml

