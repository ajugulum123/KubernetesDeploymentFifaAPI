# Deployment for the FIFA GraphQL API.
#
# Notable choices, all aimed at zero-downtime rollouts and predictable scheduling:
#   - 2 replicas at minimum so a rolling update never has zero pods serving.
#   - RollingUpdate strategy: maxUnavailable=0, maxSurge=1.
#   - terminationGracePeriodSeconds=45. preStop sleep gives the Service load balancer
#     time to take the pod out of rotation before SIGTERM lands. The app's own SIGTERM
#     handler then drains in-flight requests within 10s.
#   - Readiness probe gates traffic. Liveness probe restarts only if the process wedges.
#   - All security-context knobs tightened: non-root, no privilege escalation, read-only
#     root FS, all caps dropped, seccomp RuntimeDefault.
#   - Resources are requests (scheduling) plus limits (eviction guard rails).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fifa-api
  namespace: myapp-dev
  labels:
    app.kubernetes.io/name: fifa-api
    app.kubernetes.io/instance: dev
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fifa-api
      app.kubernetes.io/instance: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fifa-api
        app.kubernetes.io/instance: dev
        app.kubernetes.io/component: api
      annotations:
        # Force a roll on ConfigMap changes so config edits are picked up without
        # having to bump the image tag.
        rollme: "$(date +%s)"
    spec:
      serviceAccountName: fifa-api
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fifa-api
          # Image set by `kubectl set image` from the CD workflow on each deploy.
          # The :placeholder tag here makes intent explicit and forces an early
          # failure if the image-tag patch is forgotten.
          image: ghcr.io/ajugulum123/fifa-api:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fifa-api-config
            - secretRef:
                name: fifa-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                # Sleep so the Service stops sending new connections before we begin
                # shutdown. Combined with the Node SIGTERM handler, this gives 10-15s
                # of in-flight drain.
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            # Node and Apollo write some scratch files. Keeping the root FS read-only
            # forces us to mount tmpfs for these specific paths.
            - name: tmp
              mountPath: /tmp
            - name: npm-cache
              mountPath: /home/app/.npm
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: npm-cache
          emptyDir:
            sizeLimit: 64Mi
      affinity:
        # Spread replicas across nodes so a single-node failure does not lose the service.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: fifa-api
                    app.kubernetes.io/instance: dev
                topologyKey: kubernetes.io/hostname
