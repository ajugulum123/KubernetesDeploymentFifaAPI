# ServiceAccount the running app pod uses. It is intentionally minimal: no API access.
# automountServiceAccountToken=false keeps the SA token out of the pod entirely so a
# code-injection bug cannot pivot to the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fifa-api
  namespace: myapp-dev
  labels:
    app.kubernetes.io/name: fifa-api
    app.kubernetes.io/instance: dev
automountServiceAccountToken: false
