# EXAMPLE only. Do not commit the real Secret. The real Secret is created out-of-band:
#
#   kubectl create secret generic fifa-api-secrets \
#     --namespace myapp-dev \
#     --from-literal=JWT_ACCESS_SECRET="$(openssl rand -hex 64)" \
#     --from-literal=JWT_REFRESH_SECRET="$(openssl rand -hex 64)" \
#     --from-literal=ADMIN_USERNAME=admin \
#     --from-literal=ADMIN_PASSWORD="$(openssl rand -base64 24)"
#
# Or, in CI, via the deploy workflow with values pulled from GitHub Environment secrets.
apiVersion: v1
kind: Secret
metadata:
  name: fifa-api-secrets
  namespace: myapp-dev
  labels:
    app.kubernetes.io/name: fifa-api
    app.kubernetes.io/instance: dev
type: Opaque
stringData:
  JWT_ACCESS_SECRET: "REPLACE_ME_64_byte_random_hex"
  JWT_REFRESH_SECRET: "REPLACE_ME_different_64_byte_random_hex"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "REPLACE_ME_strong_password"
