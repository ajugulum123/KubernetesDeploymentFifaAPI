apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp-dev

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - networkpolicy.yaml

# secret.example.yaml is intentionally NOT in resources. The real Secret is created
# out-of-band by the operator or by the deploy workflow with values from GitHub
# Environment secrets, never committed to git.

commonLabels:
  app.kubernetes.io/part-of: fifa-cicd-platform
  environment: dev
