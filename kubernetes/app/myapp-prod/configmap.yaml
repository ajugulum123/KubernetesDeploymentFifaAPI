apiVersion: v1
kind: ConfigMap
metadata:
  name: fifa-api-config
  namespace: myapp-prod
  labels:
    app.kubernetes.io/name: fifa-api
    app.kubernetes.io/instance: prod
data:
  NODE_ENV: "production"
  DISABLE_INLINE_TLS: "true"
  PORT: "4000"
  GRAPHQL_MAX_DEPTH: "5"
  DISABLE_INTROSPECTION: "true"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "60"
  CORS_ORIGINS: "https://fifa-api.example.com"
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  CSV_PATH: "./dataset/player_stats.csv"
