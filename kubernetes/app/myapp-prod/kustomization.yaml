apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp-prod

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pdb.yaml
  # networkpolicy.yaml is intentionally NOT in the default local k3d bundle.
  # k3d's bundled NetworkPolicy enforcement has namespaceSelector quirks that
  # block Prometheus and Traefik traffic during the local demo. Apply explicitly
  # on a production-like cluster:
  #   kubectl apply -f kubernetes/app/myapp-prod/networkpolicy.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: fifa-cicd-platform
      environment: prod
