# Cap total resource consumption of all runner pods together. With maxRunners=5
# and per-pod limits of 2 CPU / 4Gi, the worst case is 10 CPU / 20Gi. The quota
# below leaves headroom while still preventing a runaway scale-up from blowing
# the cluster open.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: arc-runners-quota
  namespace: arc-runners
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    requests.ephemeral-storage: 50Gi
    limits.ephemeral-storage: 100Gi
    pods: "20"
    persistentvolumeclaims: "0"
    services.loadbalancers: "0"
    services.nodeports: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: arc-runners-limits
  namespace: arc-runners
spec:
  limits:
    # Anyone (i.e. ARC) creating a Pod here without explicit requests/limits
    # gets these defaults. Forces predictable scheduling.
    - type: Container
      default:
        cpu: "1"
        memory: "2Gi"
      defaultRequest:
        cpu: "200m"
        memory: "512Mi"
      max:
        cpu: "4"
        memory: "8Gi"
