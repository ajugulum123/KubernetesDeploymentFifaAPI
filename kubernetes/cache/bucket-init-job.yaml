# One-shot Job that creates the 'actions-cache' bucket after MinIO is up. Idempotent.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: cache
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: bucket-init
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: bucket-init
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: HOME
              value: /tmp
            - name: MC_HOST_minio
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: mcHostUrl
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Wait for MinIO. mc handles backoff internally on health checks.
              until mc ls minio >/dev/null 2>&1; do
                echo "waiting for minio..."
                sleep 2
              done
              mc mb --ignore-existing minio/actions-cache
              mc anonymous set none minio/actions-cache
              echo "Bucket actions-cache ready."
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            runAsUser: 1000
