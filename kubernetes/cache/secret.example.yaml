# EXAMPLE only. The real Secret is created out-of-band:
#
#   ACCESS=$(openssl rand -hex 16)
#   SECRET=$(openssl rand -hex 32)
#   kubectl create secret generic minio-credentials \
#     --namespace cache \
#     --from-literal=accessKey="${ACCESS}" \
#     --from-literal=secretKey="${SECRET}" \
#     --from-literal=mcHostUrl="http://${ACCESS}:${SECRET}@minio:9000"
#
# The accessKey and secretKey then have to be uploaded to GitHub as repository or
# organization secrets named CACHE_ACCESS_KEY and CACHE_SECRET_KEY so workflows
# can use them with tespkg/actions-cache.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: cache
type: Opaque
stringData:
  accessKey: "REPLACE_ME_random_access_key"
  secretKey: "REPLACE_ME_random_secret_key"
  mcHostUrl: "http://REPLACE:REPLACE@minio:9000"
