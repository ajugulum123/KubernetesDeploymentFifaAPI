apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-allow-arc-runners
  namespace: cache
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arc-runners
      ports:
        - protocol: TCP
          port: 9000
    # Console traffic is allowed from kube-system (port-forward debug). Tighten later.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 9001
