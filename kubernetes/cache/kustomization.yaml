apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cache

resources:
  - namespace.yaml
  - minio.yaml
  - bucket-init-job.yaml
  # networkpolicy.yaml is intentionally NOT in the default local k3d bundle.
  # k3d's bundled NetworkPolicy enforcement has the same namespaceSelector
  # issue described in kubernetes/buildkit/README.md. Apply this explicitly
  # on a production-like cluster:
  #   kubectl apply -f kubernetes/cache/networkpolicy.yaml

# secret.example.yaml is intentionally NOT in resources. Real Secret is created
# out-of-band, see secret.example.yaml for the exact kubectl create secret command.

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: fifa-cicd-platform
